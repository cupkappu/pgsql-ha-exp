global
  log stdout format raw local0
  maxconn 256

defaults
  log global
  mode tcp
  option tcplog
  timeout connect 3s
  timeout client 30s
  timeout server 30s
  timeout check 2s

listen postgres-write
  bind 0.0.0.0:5000
  option httpchk GET /primary
  http-check expect status 200
  default-server inter 1s fall 2 rise 2 on-marked-down shutdown-sessions
  server pg1 10.10.0.1:5432 check port 8008
  server pg2 10.10.0.2:5432 check port 8008

listen postgres-read
  bind 0.0.0.0:5001
  balance roundrobin
  option httpchk GET /replica
  http-check expect status 200
  default-server inter 1s fall 2 rise 2
  server pg1 10.10.0.1:5432 check port 8008
  server pg2 10.10.0.2:5432 check port 8008
